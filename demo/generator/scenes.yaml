scenes:
  - id: scene-setup-project
    title: "Setup Project"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project"
    typing_delay_min: 0.025
    typing_delay_max: 0.06
    line_delay: 0.04
    commands:
      - cmd: "rm -rf usb-led-flashlight"
        pause_after: 0.4
      - cmd: "mkdir -p usb-led-flashlight"
        pause_after: 0.4
      - cmd: "git init usb-led-flashlight"
        pause_after: 0.8
      - cmd: "ls usb-led-flashlight"
        pause_after: 0.8

  - id: scene-init-bomi
    title: "Initialize bomi Project"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    commands:
      - cmd: "bomi init --name \"usb-led-flashlight\" --description \"USB-C powered LED flashlight with brightness buttons\""
        pause_after: 1.0
      - cmd: "ls -la .bomi"
        pause_after: 0.8

  - id: scene-search-core-parts
    title: "Search Core Parts"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi search \"USB Type-C connector SMD\" --limit 5"
        pause_after: 1.0
      - cmd: "bomi search \"PT4115 LED driver\" --limit 5"
        pause_after: 1.0

  # Examples page only: browse resistor subcategories, then live search in one.
  - id: scene-example-categories-search
    title: "Categories and category search"
    cols: 75
    rows: 32
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi sync"
        hidden: true
        pause_after: 0.12
      - cmd: "bomi categories resistor"
        pause_after: 1.0
      - cmd: "bomi search \"10k 0402\" --category \"Chip Resistor - Surface Mount\" --limit 5"
        pause_after: 1.2

  - id: scene-inspect-driver
    title: "Fetch and Inspect Driver"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi fetch C347356"
        pause_after: 0.8
      - cmd: "bomi info C347356"
        pause_after: 1.2

  - id: scene-search-supporting-parts
    title: "Search Supporting Power Parts"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi search \"Schottky diode SOD-123\" --basic-only --limit 5"
        pause_after: 0.8
      - cmd: "bomi search \"inductor 47uH SMD\" --limit 5"
        pause_after: 0.8
      - cmd: "bomi search \"SMD tactile switch\" --limit 5"
        pause_after: 0.8

  - id: scene-compare-switch-options
    title: "Compare Switch Options"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi fetch C145837"
        pause_after: 0.6
      - cmd: "bomi compare C49023761 C145837"
        pause_after: 1.2

  - id: scene-select-bom-parts
    title: "Select BOM Parts"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    min_pause_after: 0.12
    commands:
      - cmd: "bomi select C8598 --ref D1 --qty 1 --notes \"Schottky catch diode\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C354577 --ref L1 --qty 1 --notes \"47uH buck inductor\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C17888 --ref R1 --qty 1 --notes \"Current set resistor placeholder\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C14663 --ref C1 --qty 1 --notes \"100nF input bypass\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C13585 --ref C2 --qty 1 --notes \"10uF input bulk cap\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C49023761 --ref SW1 --qty 1 --notes \"Brightness up button\""
        hidden: true
        pause_after: 0.05
      - cmd: "bomi select C456012 --ref J1 --qty 1 --notes \"USB-C 6-pin power input\""
        pause_after: 0.15
      - cmd: "bomi select C347356 --ref U1 --qty 1 --notes \"PT4115 LED driver\""
        pause_after: 0.15
      - cmd: "bomi select C3015100 --ref LED1 --qty 1 --notes \"White high-power LED placeholder\""
        pause_after: 0.15
      - cmd: "bomi select C49023761 --ref SW2 --qty 1 --notes \"Brightness down button\""
        pause_after: 0.25

  - id: scene-review-bom-status
    title: "Review BOM and Status"
    cols: 100
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi list"
        pause_after: 1.0
      - cmd: "bomi status"
        pause_after: 1.0

  - id: scene-refine-validate
    title: "Refine and Validate"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "bomi relabel C1 C99"
        pause_after: 0.4
      - cmd: "bomi relabel C2 C1"
        pause_after: 0.4
      - cmd: "bomi relabel C99 C2"
        pause_after: 0.4
      - cmd: "bomi list --check"
        pause_after: 0.8
      - cmd: "bomi list --format csv"
        pause_after: 0.4
      - cmd: "bomi list --format json"
        pause_after: 0.8

  - id: scene-artifacts-and-git
    title: "Artifacts and Git State"
    cols: 75
    rows: 28
    working_dir: "demo/presentation/demo-project/usb-led-flashlight"
    line_delay: 0.03
    commands:
      - cmd: "mkdir -p artifacts/datasheets"
        pause_after: 0.2
      - cmd: "bomi datasheet C347356 C456012 --pdf -o artifacts/datasheets"
        pause_after: 0.8
      - cmd: "git status --short"
        pause_after: 0.8
